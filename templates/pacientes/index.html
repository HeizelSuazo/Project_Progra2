<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Pacientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Listado de Pacientes</h2>
        <div>
            <a href="/pacientes/agregar" class="btn btn-primary">Nuevo Paciente</a>
            <a href="/" class="btn btn-secondary">Volver al Inicio</a>
        </div>
    </div>
    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>Código</th><th>Identidad</th><th>Nombre</th><th>Apellido</th><th>Fecha de Nacimiento</th><th>Telefono</th><th>Correo</th><th>Direccion</th><th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for paciente in lista_pacientes %}
            <tr>
                <td>{{ paciente.0 }}</td><td>{{ paciente.1 }}</td><td>{{ paciente.2 }}</td>
                <td>{{ paciente.3 }}</td><td>{{ paciente.4 }}</td>
                <td>
                    <a href="/pacientes/editar/{{ paciente.0 }}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="/pacientes/eliminar/{{ paciente.0 }}" class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
