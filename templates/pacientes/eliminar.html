<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="card shadow border-danger w-50 mx-auto">
        <div class="card-header bg-danger text-white"><h4>Confirmar Eliminación</h4></div>
        <div class="card-body text-center">
            <p>¿Estás seguro de eliminar a <strong>{{ paciente.1 }} {{ paciente.2 }}</strong>?</p>
            <form action="" method="POST">
                <button type="submit" class="btn btn-danger">Sí, Eliminar</button>
                <a href="/pacientes/" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
