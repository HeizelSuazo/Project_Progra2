{% extends "layout.html" %}

{% block title %}Eliminar Paciente{% endblock %}

{% block content %}
<div class="confirm-shell mx-auto">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4 p-lg-5 text-center">
            <div class="danger-icon mx-auto mb-3">
                <i class="bi bi-exclamation-triangle-fill"></i>
            </div>
            <p class="eyebrow mb-1">Pacientes</p>
            <h1 class="h3 mb-3">Confirmar eliminacion</h1>
            <p class="text-secondary mb-4">
                Se eliminara el registro de <strong>{{ paciente.Nombre }} {{ paciente.Apellido }}</strong>.
            </p>
            <form method="POST" class="d-flex justify-content-center gap-2 flex-wrap">
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-trash3-fill me-2"></i>Si, eliminar
                </button>
                <a href="{{ url_for('pacientes.index') }}" class="btn btn-outline-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
