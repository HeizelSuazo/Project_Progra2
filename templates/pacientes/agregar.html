{% extends "layout.html" %}

{% block title %}Agregar Paciente{% endblock %}

{% block content %}
<div class="form-shell mx-auto">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <p class="eyebrow mb-1">Pacientes</p>
            <h1 class="h3 mb-0">Agregar paciente</h1>
        </div>
        <a href="{{ url_for('pacientes.index') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-2"></i>Volver
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form method="POST" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Identidad</label>
                    <input type="text" name="Identidad" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Fecha de nacimiento</label>
                    <input type="date" name="Fecha" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="Nombre" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Apellido</label>
                    <input type="text" name="Apellido" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Telefono</label>
                    <input type="text" name="Telefono" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Correo</label>
                    <input type="email" name="Correo" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Direccion</label>
                    <input type="text" name="Direccion" class="form-control" required>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-floppy-fill me-2"></i>Guardar
                    </button>
                    <a href="{{ url_for('pacientes.index') }}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
