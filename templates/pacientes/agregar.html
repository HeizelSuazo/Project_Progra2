<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="card shadow w-50 mx-auto">
        <div class="card-header bg-primary text-white"><h4>Agregar Paciente</h4></div>
        <div class="card-body">
            <form action="" method="POST">
                <div class="mb-3"><label>Nombre:</label><input type="text" name="PacNombre" class="form-control" required></div>
                <div class="mb-3"><label>Apellido:</label><input type="text" name="PacApellido" class="form-control" required></div>
                <div class="mb-3"><label>Correo:</label><input type="email" name="PacCorreo" class="form-control" required></div>
                <div class="mb-3"><label>Teléfono:</label><input type="text" name="PacTelefono" class="form-control" required></div>
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="/pacientes/" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
