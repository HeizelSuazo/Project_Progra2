<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Agregar Doctor</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5"><div class="card shadow w-50 mx-auto"><div class="card-header bg-success text-white"><h4>Agregar Doctor</h4></div>
    <div class="card-body"><form action="" method="POST">
        <div class="mb-3"><label>Nombre:</label><input type="text" name="Nombre" class="form-control" required></div>
        <div class="mb-3"><label>Apellido:</label><input type="text" name="Apellido" class="form-control" required></div>
        <div class="mb-3"><label>Especialidad:</label><input type="text" name="Especialidad" class="form-control" required></div>
        <div class="mb-3"><label>Licencia:</label><input type="text" name="Licencia" class="form-control" required></div>
        <div class="mb-3"><label>Teléfono:</label><input type="text" name="Telefono" class="form-control" required></div>
        <div class="mb-3"><label>Correo:</label><input type="text" name="Correo" class="form-control" required></div>
        <button type="submit" class="btn btn-success">Guardar</button> <a href="/doctores/" class="btn btn-secondary">Cancelar</a>
    </form></div></div></body></html>
