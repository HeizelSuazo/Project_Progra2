<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><title>Lista de Doctores</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5">
    <div class="d-flex justify-content-between mb-4"><h2>Doctores</h2><div><a href="/doctores/agregar" class="btn btn-success">Nuevo Doctor</a> <a href="/" class="btn btn-secondary">Inicio</a></div></div>
    <table class="table table-striped shadow-sm"><thead class="table-dark"><tr><th>ID</th><th>Nombre</th><th>Apellido</th><th>Especialidad</th><th>Licencia</th><th>Teléfono</th><th>Correo</th><th>Acciones</th></tr></thead>
        <tbody>
            {% for doctor in lista_doctores %}
            <tr><td>{{ doctor.0 }}</td><td>{{ doctor.1 }}</td><td>{{ doctor.2 }}</td><td>{{ doctor.3 }}</td><td>{{ doctor.4 }}</td><td>{{ doctor.5 }}</td><td>{{ doctor.6 }}</td>
                <td><a href="/doctores/editar/{{ doctor.0 }}" class="btn btn-warning btn-sm">Editar</a> <a href="/doctores/eliminar/{{ doctor.0 }}" class="btn btn-danger btn-sm">Eliminar</a></td></tr>
            {% endfor %}
        </tbody>
    </table>
</body></html>
