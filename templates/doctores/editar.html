{% extends "layout.html" %}

{% block title %}Editar Doctor{% endblock %}

{% block content %}
<div class="form-shell mx-auto">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <p class="eyebrow mb-1">Doctores</p>
            <h1 class="h3 mb-0">Editar doctor</h1>
        </div>
        <a href="{{ url_for('doctores.index') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-2"></i>Volver
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form method="POST" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="Nombre" class="form-control" value="{{ doctor.Nombre }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Apellido</label>
                    <input type="text" name="Apellido" class="form-control" value="{{ doctor.Apellido }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Especialidad</label>
                    <input type="text" name="Especialidad" class="form-control" value="{{ doctor.Especialidad }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Licencia</label>
                    <input type="text" name="Licencia" class="form-control" value="{{ doctor.Licencia }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Telefono</label>
                    <input type="text" name="Telefono" class="form-control" value="{{ doctor.Telefono }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Correo</label>
                    <input type="email" name="Correo" class="form-control" value="{{ doctor.Correo }}" required>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-warning text-white">
                        <i class="bi bi-arrow-repeat me-2"></i>Actualizar
                    </button>
                    <a href="{{ url_for('doctores.index') }}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
