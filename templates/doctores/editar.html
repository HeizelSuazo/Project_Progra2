<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Editar Doctor</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5"><div class="card shadow w-50 mx-auto"><div class="card-header bg-warning"><h4>Editar Doctor</h4></div>
    <div class="card-body"><form action="" method="POST">
        <div class="mb-3"><label>Nombre:</label><input type="text" name="DocNombre" class="form-control" value="{{ doctor.1 }}" required></div>
        <div class="mb-3"><label>Apellido:</label><input type="text" name="DocApellido" class="form-control" value="{{ doctor.2 }}" required></div>
        <div class="mb-3"><label>Especialidad:</label><input type="text" name="DocEspecialidad" class="form-control" value="{{ doctor.3 }}" required></div>
        <div class="mb-3"><label>Teléfono:</label><input type="text" name="DocTelefono" class="form-control" value="{{ doctor.4 }}" required></div>
        <button type="submit" class="btn btn-warning">Actualizar</button> <a href="/doctores/" class="btn btn-secondary">Cancelar</a>
    </form></div></div></body></html>
