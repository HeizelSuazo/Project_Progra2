{% extends "layout.html" %}

{% block title %}Inicio | Sistema Clinico{% endblock %}

{% block content %}
<section class="hero-section rounded-4 p-4 p-lg-5 mb-4">
    <div class="row align-items-center g-4">
        <div class="col-lg-7">
            <span class="badge rounded-pill text-bg-light text-primary-emphasis mb-3">Project_Progra2</span>
            <h1 class="display-6 fw-bold mb-3">Sistema de gestion clinica </h1>
            <p class="lead text-secondary mb-4">
                Administra pacientes y doctores 
            </p>
            <div class="d-flex flex-wrap gap-2">
                <a href="{{ url_for('pacientes.index') }}" class="btn btn-primary btn-lg">
                    <i class="bi bi-people-fill me-2"></i>Modulo Pacientes
                </a>
                <a href="{{ url_for('doctores.index') }}" class="btn btn-outline-success btn-lg">
                    <i class="bi bi-heart-pulse-fill me-2"></i>Modulo Doctores
                </a>
            </div>
        </div>
</section>

<section class="row g-4">
    <div class="col-md-6">
        <article class="card h-100 shadow-sm border-0 module-card">
            <div class="card-body p-4">
                <div class="icon-chip bg-primary-subtle text-primary mb-3">
                    <i class="bi bi-person-vcard-fill"></i>
                </div>
                <h2 class="h4">Pacientes</h2>
                <a href="{{ url_for('pacientes.index') }}" class="btn btn-primary">
                    Ver pacientes
                </a>
            </div>
        </article>
    </div>
    <div class="col-md-6">
        <article class="card h-100 shadow-sm border-0 module-card">
            <div class="card-body p-4">
                <div class="icon-chip bg-success-subtle text-success mb-3">
                    <i class="bi bi-hospital-fill"></i>
                </div>
                <h2 class="h4">Doctores</h2>
                <a href="{{ url_for('doctores.index') }}" class="btn btn-success">
                    Ver doctores
                </a>
            </div>
        </article>
    </div>
</section>
{% endblock %}
